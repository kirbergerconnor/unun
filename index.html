<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Will You Marry Me?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
    }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #f3e7e9 0%, #e3eeff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(200,90,140,0.13), 0 1.5px 7px rgba(140,170,240,.09);
      width: 100%;
      max-width: 430px;
      padding: 1.5rem 1.2rem 1.8rem 1.2rem;
      margin: 1rem;
      text-align: center;
    }
    .headline {
      font-family: 'Montserrat', Arial, sans-serif;
      font-weight: 700;
      font-size: 2.2rem;
      color: #e11d48;
      margin-bottom: 1.1rem;
      text-shadow: 0 1px 0 rgba(225,29,72,0.08);
    }
    .aspect-ratio-box {
      width: 100%;
      position: relative;
      aspect-ratio: 16/9;
      background: #18181b;
      border-radius: 13px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 2.5px 13px rgba(73,27,115,0.03) inset;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .aspect-ratio-box video {
      width: 100%;
      height: 100%;
      display: block;
      background: #18181b;
      outline: none;
      border-radius: inherit;
    }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: #444;
    }
    input[type="text"] {
      width: 95%;
      margin-bottom: 11px;
      padding: 7px 8px;
      border: 1px solid #d3d3d6;
      border-radius: 5px;
      font-size: 1rem;
    }
    .btn {
      display: inline-block;
      background: #fb7185;
      color: #fff;
      font-weight: bold;
      font-size: 1.05rem;
      padding: 0.6em 2em;
      border: none;
      border-radius: 8px;
      margin-top: 12px;
      margin-bottom: 7px;
      cursor: pointer;
      transition: background .14s;
    }
    .btn:hover {
      background: #be185d;
    }
    .desc {
      font-size: 0.92em;
      color: #555;
      margin-bottom: 1.2em;
      margin-top: .3em;
    }
    .alert {
      font-size: .97em;
      color: #e11d48;
      background: #fbeff2;
      border: 1px solid #f9dde6;
      border-radius: 5px;
      padding: 7px;
      margin: 13px 0 8px 0;
    }
    footer {
      color: #aaa;
      font-size: .97em;
      margin-top: 2.2rem;
      opacity: 0.7;
      padding: .3em;
      border-top: 1px solid #ededfc;
    }
    @media (max-width: 500px){
      .headline {font-size: 1.3rem;}
      .card {padding:.7rem .18rem 1rem .18rem;}
    }
  </style>
</head>
<body>
  <main class="card" id="mainCard">
    <div>
      <h1 class="headline">💍 Will You Marry Me?</h1>
    </div>
    <div class="aspect-ratio-box" id="videoBox">
      <video id="preVideo" autoplay playsinline controls poster="https://images.unsplash.com/photo-1464983953574-0892a716854b?auto=format&fit=facearea&w=600&q=80"></video>
    </div>
    <div id="setupForm" style="">
      <label for="liveURL">Live Camera Stream URL (from your phone):</label>
      <input type="text" id="liveURL" placeholder="e.g. http://192.168.1.42:8080/video" autocomplete="off" />
      <div class="desc">
        <!-- Enter your phone's local stream address from your webcam app<br>
        (e.g. <b>IP Webcam</b> &mdash; must be on the same Wi-Fi). -->
      </div>
    </div>
    <div class="desc" id="descText">
      <!-- Proposal video will play first.<br>
      <b>When it ends, it will switch to live video automatically!</b> -->
    </div>
    <div id="alertMsg" class="alert" style="display:none"></div>
    <button id="replayBtn" class="btn" style="display:none;">&#x25B6; Replay Proposal Video</button>
    <footer>
      &copy; <span id="year"></span> WillYouMarryMeUncheng.com &mdash; Made with love
    </footer>
  </main>
  <script>
    // --- CHANGE THIS! --- //
    const PRE_RECORDED_URL = "https://www.w3schools.com/html/mov_bbb.mp4";
    //      ^^^^^^^^^^^^^^^^^^  REPLACE with your proposal video URL!

    // --- Main logic below --- //
    const preVideo = document.getElementById("preVideo");
    const videoBox = document.getElementById("videoBox");
    const replayBtn = document.getElementById("replayBtn");
    const alertMsg = document.getElementById("alertMsg");
    const setupForm = document.getElementById("setupForm");
    const mainCard = document.getElementById("mainCard");
    const descText = document.getElementById("descText");
    const liveURLinput = document.getElementById("liveURL");
    document.getElementById("year").textContent = (new Date()).getFullYear();

    // Set proposal video
    preVideo.src = PRE_RECORDED_URL;
    let liveURL = "";

    // On video end, switch to live
    preVideo.onended = () => {
      liveURL = liveURLinput.value.trim();
      if (!/^https?:\/\/.+/i.test(liveURL)) {
        alertMsg.style.display = "block";
        alertMsg.textContent = "Please enter a valid live webcam stream URL (starting with http:// or https://) from your phone before playing.";
        return;
      }
      alertMsg.style.display = "none";
      showLiveVideo(liveURL);
    };

    // Show live phone stream
    function showLiveVideo(url) {
      setupForm.style.display = "none";
      replayBtn.style.display = "inline-block";
      descText.textContent = "Switched to live! If you want to replay the proposal video, tap below.";
      // Remove video and re-add with live source
      videoBox.innerHTML = `<video id="liveVideo" autoplay playsinline controls></video>`;
      const liveVideo = document.getElementById("liveVideo");
      liveVideo.src = url;
      liveVideo.onerror = () => {
        alertMsg.style.display = "block";
        alertMsg.textContent = "Could not load the live stream. Check that your phone is running the streaming app and is on the same network.";
      };
    }

    // Replay proposal video
    replayBtn.onclick = function () {
      alertMsg.style.display = "none";
      setupForm.style.display = "";
      replayBtn.style.display = "none";
      descText.textContent = "Proposal video will play first.\nWhen it ends, it will switch to live video automatically!";
      videoBox.innerHTML = `<video id="preVideo" autoplay playsinline controls poster="https://images.unsplash.com/photo-1464983953574-0892a716854b?auto=format&fit=facearea&w=600&q=80"></video>`;
      const preVideo2 = document.getElementById("preVideo");
      preVideo2.src = PRE_RECORDED_URL;
      preVideo2.onended = preVideo.onended;
    };

    // Enter key also plays video if focused on input
    liveURLinput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        preVideo.focus();
      }
    });
  </script>
</body>
</html>
